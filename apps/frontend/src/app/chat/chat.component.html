<div class="chat-container">
  <div class="header">
    <h1>Web development course</h1>
  </div>

  <div class="message-area">
    @for (message of messages; track message) {
      <div
        class="message"
        [class.user-message]="message.isUser"
        [class.ai-message]="!message.isUser"
      >
        @if (message.isUser) {
          <div class="message-content">
            @if (message.isLoading) {
              <span class="loading-cursor">▊</span>
            } @else {
              <span>{{ message.text }}</span>
            }
          </div>
        } @else {
          @if (message.isLoading) {
            <div class="message-content">
              <span class="loading-cursor">▊</span>
            </div>
          } @else {
            @if (message.isSlide) {
              <app-slide [title]="message.title || ''" [content]="message.content || ''" [sources]="message.sources || ''"></app-slide>
            } @else {
              <div class="message-content ai-plain-text">
                <span>{{ message.text }}</span>
              </div>
            }
          }
        }
      </div>
    }
  </div>

  <div class="input-row">
    <input
      type="text"
      [(ngModel)]="userInput"
      (keypress)="onKeyPress($event)"
      [disabled]="isProcessing"
      placeholder="Ask me what you want to know..."
      class="message-input"
    />
    <button
      (click)="sendMessage()"
      [disabled]="!userInput.trim() || isProcessing"
      class="send-button"
    >
      Send
    </button>
  </div>
</div>
